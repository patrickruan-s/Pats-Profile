services:
  - type: web
    name: pats-profile-backend
    runtime: ruby
    rootDir: pats_profile_backend
    buildCommand: "bundle install && bundle exec rails db:migrate"
    startCommand: bundle exec rails server -b 0.0.0.0 -p $PORT
    healthCheckPath: /up
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: pats-profile-db
          property: connectionString
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: AWS_S3_BUCKET
        sync: false
      - key: FRONTEND_URL
        sync: false

databases:
  - name: pats-profile-db
    databaseName: pats_profile_production
    plan: free
